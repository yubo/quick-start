apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-server
  labels:
    app: echo-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-server
  template:
    metadata:
      labels:
        app: echo-server
    spec:
      containers:
      - name: server
        #image: k8s.gcr.io/echoserver:1.10
        image: k8s.gcr.io/echoserver-arm:1.8
        ports:
        - containerPort: 8080
          protocol: TCP
          name: echo-server
